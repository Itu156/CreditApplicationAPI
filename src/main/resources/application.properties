spring.application.name=CreditApplicationAPI

server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/credit_application_db?createDatabaseIfNotExist=true
spring.datasource.username=creditdata
spring.datasource.password=@CreditApp

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
